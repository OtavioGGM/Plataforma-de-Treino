<!DOCTYPE html> <html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="CSS/style.css">
  <title>Timer</title>
</head>
<body>
  <div id="timer" class="time-display">00:00</div>
  
  <section class="align-inputs">
    <div class="timer-input">
      <label for="minute">Minutos</label>
      <input type="number" name="" id="minute" value="00" max="59" min="0">
    </div>
    <div class="timer-input">
      <label for="second">Segundos</label>
      <input type="number" name="" id="second" value="00" max="59" min="0">
    </div>
  
  </section>

  <div class="card">
    <button id="btn-start">INICIAR</button>
    <button id="btn-stop" disabled>CANCELAR</button>
  </div>

</body>
<script src="./JavaScript/script.js"></script>
</html>
